<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Books Recommender</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--surface:#10101a;--surface2:#18182a;--border:#25253a;
  --accent:#8b7cf8;--accent2:#f0c040;--text:#eeeef8;--muted:#6868a0;
  --red:#f77070;--green:#70f7a8;--blue:#70b8f7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HEADER */
.header{
  padding:36px 48px 28px;
  background:linear-gradient(135deg,#080810 50%,#14102a 100%);
  border-bottom:1px solid var(--border);position:relative;overflow:hidden;
}
.header::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:360px;height:360px;pointer-events:none;
  background:radial-gradient(circle,rgba(139,124,248,.18) 0%,transparent 68%);
}
.htop{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tag{background:rgba(139,124,248,.15);color:var(--accent);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1.2px;text-transform:uppercase;border:1px solid rgba(139,124,248,.3)}
h1{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,44px);font-weight:900;line-height:1.1}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);margin-top:6px;font-size:14px}

/* STATS */
.stats-bar{
  display:flex;gap:0;background:var(--surface);
  border-bottom:1px solid var(--border);overflow-x:auto;
}
.stat{
  padding:18px 28px;display:flex;flex-direction:column;gap:2px;
  white-space:nowrap;border-right:1px solid var(--border);
}
.stat:last-child{border-right:none}
.stat-num{font-size:21px;font-weight:700;color:var(--accent2);font-family:'Playfair Display',serif}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* CONTROLS */
.controls{
  padding:18px 48px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;
  background:rgba(8,8,16,.92);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);
}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:380px}
.search-wrap input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;font-size:14px;
  font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:7px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.sort-select{
  padding:9px 12px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;font-size:13px;cursor:pointer;
  font-family:'DM Sans',sans-serif;outline:none;
}

/* MAIN */
.main{padding:28px 48px}
.results-meta{font-size:13px;color:var(--muted);margin-bottom:18px}
.results-meta strong{color:var(--text)}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;
}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 14px 40px rgba(139,124,248,.13)}
.card-img{width:100%;height:155px;object-fit:cover;background:var(--surface2)}
.card-img-ph{width:100%;height:155px;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:44px}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:7px}
.card-cat{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase}
.card-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.3;color:var(--text)}
.card-author{font-size:12px;color:var(--muted)}
.card-desc{font-size:11.5px;color:var(--muted);line-height:1.55;flex:1}
.card-footer{padding:11px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.rating{display:flex;align-items:center;gap:5px}
.stars{color:var(--accent2);font-size:12px;letter-spacing:1px}
.rating-num{font-weight:600;font-size:13px}
.vote-count{font-size:11px;color:var(--muted)}
.card-meta{display:flex;gap:6px;flex-shrink:0}
.meta-pill{font-size:10px;color:var(--muted);background:var(--surface2);padding:3px 7px;border-radius:6px}
.source-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:2px}
.source-google{background:var(--blue)}
.source-gr{background:var(--green)}

/* CAT COLORS */
.cat-ai{color:#a78bfa}.cat-prog{color:#60a5fa}.cat-sec{color:var(--red)}
.cat-cloud{color:#34d399}.cat-ds{color:#fb923c}.cat-db{color:#f472b6}
.cat-elec{color:var(--accent2)}.cat-mech{color:#94a3b8}.cat-sw{color:#c084fc}
.cat-net{color:#67e8f9}.cat-gen{color:var(--muted)}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(5px);animation:fi .18s;
}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:700px;max-height:88vh;overflow-y:auto;
  animation:su .22s;position:relative;
}
@keyframes su{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{
  position:sticky;top:14px;float:right;margin:14px 16px 0 0;
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;z-index:10;flex-shrink:0;
}
.modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);display:flex;gap:18px;clear:both}
.modal-cover{width:95px;height:130px;object-fit:cover;border-radius:8px;background:var(--surface2);flex-shrink:0}
.modal-cover-ph{width:95px;height:130px;background:linear-gradient(135deg,var(--surface2),var(--border));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.modal-info{flex:1;min-width:0}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.2;margin-bottom:5px}
.modal-author{color:var(--muted);font-size:13px;margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.badge{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.badge-r{background:rgba(240,192,64,.1);color:var(--accent2);border-color:rgba(240,192,64,.3)}
.badge-p{background:rgba(139,124,248,.1);color:var(--accent);border-color:rgba(139,124,248,.3)}
.badge-y{background:rgba(112,247,168,.1);color:var(--green);border-color:rgba(112,247,168,.3)}
.badge-src{background:rgba(103,232,249,.1);color:var(--blue);border-color:rgba(103,232,249,.3)}
.score-row{display:flex;align-items:center;gap:8px}
.score-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.score-lbl{font-size:11px;color:var(--muted)}
.modal-body{padding:20px 28px 28px}
.modal-desc{font-size:13.5px;line-height:1.7;color:#bbbbd8;margin-bottom:22px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.recs-list{display:flex;flex-direction:column;gap:8px}
.rec-item{
  padding:11px 14px;background:var(--surface2);border-radius:10px;
  border:1px solid var(--border);display:flex;justify-content:space-between;
  align-items:center;cursor:pointer;transition:border-color .15s;gap:10px;
}
.rec-item:hover{border-color:var(--accent)}
.rec-title{font-size:13px;font-weight:500;line-height:1.3}
.rec-author{font-size:11px;color:var(--muted);margin-top:2px}
.rec-right{text-align:right;flex-shrink:0}
.rec-sim{font-size:12px;color:var(--accent);font-weight:700}
.rec-rat{font-size:11px;color:var(--muted)}

@media(max-width:600px){
  .header,.controls,.main{padding-left:16px;padding-right:16px}
  .stats-bar{padding:0}
  .stat{padding:14px 18px}
  .modal-header{flex-direction:column}
  .modal-cover,.modal-cover-ph{width:70px;height:96px}
}
</style>
</head>
<body>

<div class="header">
  <div class="htop">
    <div class="logo">📚</div>
    <span class="tag">ML · TF-IDF · Cosine Similarity</span>
  </div>
  <h1>Engineering<br><span>Books Recommender</span></h1>
  <p class="subtitle">Trained on 3,349 books from Goodreads &amp; Google Books · Ranked by rating &amp; popularity</p>

</div>

<div class="main">
  <div class="results-meta" id="resultsMeta"></div>
  <div class="grid" id="bookGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal"></div>
</div>

const CAT_COLOR = {
  'AI/ML':'cat-ai','Programming':'cat-prog','Security':'cat-sec',
  'Cloud/DevOps':'cat-cloud','Data Science':'cat-ds','Databases':'cat-db',
  'Electrical':'cat-elec','Mechanical':'cat-mech','Software Eng':'cat-sw',
  'Networking':'cat-net','General Engineering':'cat-gen'
};
const CAT_EMOJI = {
  'AI/ML':'🤖','Programming':'💻','Security':'🔐','Cloud/DevOps':'☁️',
  'Data Science':'📊','Databases':'🗄️','Electrical':'⚡','Mechanical':'⚙️',
  'Software Eng':'🏗️','Networking':'🌐','General Engineering':'📐'
};

let currentCat = 'all';

/* ── Filter + Sort ─────────────────────────────────────── */
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let list = BOOKS.filter(b => {
    if (currentCat !== 'all' && b.category !== currentCat) return false;
    if (!q) return true;
    // Search across title, author, description
    return (
      (b.title  || '').toLowerCase().includes(q) ||
      (b.author || '').toLowerCase().includes(q) ||
      (b.publisher || '').toLowerCase().includes(q) ||
      (b.desc_short || '').toLowerCase().includes(q)
    );
  });

  list = [...list].sort((a, b2) => {
    if (sort === 'score')      return b2.score - a.score;
    if (sort === 'rating')     return b2.rating - a.rating;
    if (sort === 'popularity') return b2.ratings_count - a.ratings_count;
    if (sort === 'year')       return b2.year - a.year;
    return 0;
  });
  return list;
}

function render() {
  const list = getFiltered();
  const meta = document.getElementById('resultsMeta');
  const q = document.getElementById('searchInput').value.trim();
  meta.innerHTML = q
    ? `<strong>${list.length}</strong> results for "<strong>${escHtml(q)}</strong>"`
    : `Showing <strong>${list.length}</strong> books`;

  const grid = document.getElementById('bookGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">😕 No books found. Try a different search or filter.</div>';
    return;
  }
  grid.innerHTML = list.map(b => cardHtml(b)).join('');
}

/* ── Card HTML ─────────────────────────────────────────── */
function cardHtml(b) {
  const ce = CAT_EMOJI[b.category] || '📚';
  const cc = CAT_COLOR[b.category] || 'cat-gen';
  const img = b.image
    ? `<img class="card-img" src="${escAttr(b.image)}" loading="lazy" onerror="this.outerHTML='<div class=card-img-ph>${ce}</div>'">`
    : `<div class="card-img-ph">${ce}</div>`;
  const stars = starsHtml(b.rating);
  return `
  <div class="card" onclick="openModal(${JSON.stringify(b.title)})">
    ${img}
    <div class="card-body">
      <div class="card-cat ${cc}">${ce} ${b.category}</div>
      <div class="card-title">${escHtml(b.title)}</div>
      <div class="card-author">by ${escHtml(b.author||'Unknown')}</div>
      ${b.desc_short ? `<div class="card-desc">${escHtml(b.desc_short.slice(0,140))}…</div>` : ''}
    </div>
    <div class="card-footer">
      <div class="rating">
        <span class="stars">${stars}</span>
        <span class="rating-num">${b.rating > 0 ? b.rating.toFixed(1) : 'N/A'}</span>
        ${b.ratings_count > 0 ? `<span class="vote-count">(${b.ratings_count.toLocaleString()})</span>` : ''}
      </div>
      <div class="card-meta">
        ${b.year > 0 ? `<span class="meta-pill">${b.year}</span>` : ''}
        ${b.pages > 0 ? `<span class="meta-pill">${b.pages}p</span>` : ''}
      </div>
    </div>
  </div>`;
}

/* ── Modal ─────────────────────────────────────────────── */
function openModal(title) {
  const b = BOOKS.find(x => x.title === title);
  if (!b) return;
  const recs = RECS[title] || [];
  const ce = CAT_EMOJI[b.category] || '📚';
  const cc = CAT_COLOR[b.category] || 'cat-gen';
  const sp = Math.round(b.score * 100);
  const coverHtml = b.image
    ? `<img class="modal-cover" src="${escAttr(b.image)}" onerror="this.outerHTML='<div class=modal-cover-ph>${ce}</div>'">`
    : `<div class="modal-cover-ph">${ce}</div>`;
  const recsHtml = recs.length
    ? `<div class="sec-title">🔗 Similar Books (ML Recommended)</div>
       <div class="recs-list">${recs.map(r => `
         <div class="rec-item" onclick="openModal(${JSON.stringify(r.title)})">
           <div>
             <div class="rec-title">${escHtml(r.title)}</div>
             <div class="rec-author">${escHtml(r.author)}</div>
           </div>
           <div class="rec-right">
             <div class="rec-sim">${Math.round(r.similarity*100)}% match</div>
             <div class="rec-rat">⭐ ${r.rating > 0 ? r.rating.toFixed(1) : 'N/A'}</div>
           </div>
         </div>`).join('')}</div>`
    : `<p style="color:var(--muted);font-size:13px">No similar books found in top rankings.</p>`;

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      ${coverHtml}
      <div class="modal-info">
        <div class="card-cat ${cc}" style="margin-bottom:5px">${ce} ${b.category}</div>
        <div class="modal-title">${escHtml(b.title)}</div>
        <div class="modal-author">by ${escHtml(b.author||'Unknown')} · ${escHtml(b.publisher||'')}</div>
        <div class="badges">
          ${b.rating > 0 ? `<span class="badge badge-r">⭐ ${b.rating.toFixed(1)} / 5</span>` : ''}
          ${b.pages > 0 ? `<span class="badge badge-p">📄 ${b.pages} pages</span>` : ''}
          ${b.year > 0 ? `<span class="badge badge-y">📅 ${b.year}</span>` : ''}
          <span class="badge badge-src">${escHtml(b.source||'')}</span>
        </div>
        <div class="score-lbl" style="margin-bottom:4px">ML Score: ${sp}%</div>
        <div class="score-row">
          <div class="score-track"><div class="score-fill" style="width:${sp}%"></div></div>
          <span class="score-lbl">${b.ratings_count.toLocaleString()} reviews</span>
        </div>
      </div>
    </div>
    <div class="modal-body">
      ${b.desc_short ? `<p class="modal-desc">${escHtml(b.desc_short)}…</p>` : ''}
      ${recsHtml}
    </div>`;

  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

/* ── Helpers ───────────────────────────────────────────── */
function starsHtml(r) {
  if (!r) return '☆☆☆☆☆';
  const full = Math.min(5, Math.round(r));
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Events ────────────────────────────────────────────── */
// Search — live with debounce
let debTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debTimer);
  debTimer = setTimeout(render, 180);
});

document.getElementById('sortSelect').addEventListener('change', render);

document.getElementById('catFilters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentCat = btn.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
render();
</script>
</body>
</html>
