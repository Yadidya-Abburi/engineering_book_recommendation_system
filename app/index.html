<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookify – Engineering Book Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#121212;--bg2:#181818;--bg3:#232323;--bg4:#2a2a2a;
  --sidebar:#000;--accent:#1db954;--accent2:#1ed760;
  --text:#fff;--text2:#b3b3b3;--text3:#6a6a6a;--border:#2a2a2a;
  --hover:#282828;--sw:242px;--font:'Figtree',sans-serif;--fd:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden;height:100vh}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar{width:var(--sw);background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a2a2a transparent}
.logo{padding:22px 20px 14px;font-family:var(--fd);font-size:20px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo span{color:#fff}
.slbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:10px 20px 5px}
.sitem{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
.sitem:hover{color:#fff}
.sitem.active .sico{color:var(--accent)}
.sico{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.cpill{display:flex;align-items:center;gap:9px;padding:7px 20px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:all .15s}
.cpill:hover{color:#fff}
.cpill.active{color:#fff}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── MAIN ────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,#1a1a2e 0%,var(--bg) 280px)}
.topbar{height:58px;display:flex;align-items:center;padding:0 22px;gap:13px;flex-shrink:0;z-index:10}
.navbtn{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.navbtn:hover{color:#fff;background:var(--bg4)}
.sbar{flex:1;max-width:360px;position:relative}
.sbar input{width:100%;padding:9px 14px 9px 38px;background:var(--bg3);border:none;border-radius:22px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:background .2s}
.sbar input:focus{background:var(--bg4)}
.sbar input::placeholder{color:var(--text3)}
.sico2{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.tbr{margin-left:auto;display:flex;gap:7px}
.sbtn{padding:6px 13px;background:var(--bg3);border:none;border-radius:18px;color:var(--text2);font-size:11px;font-family:var(--font);cursor:pointer;font-weight:600;transition:all .15s}
.sbtn:hover{background:var(--bg4);color:#fff}
.sbtn.active{background:var(--accent);color:#000}

/* ── CONTENT SPLIT ───────────────────────────── */
.carea{flex:1;display:flex;overflow:hidden}
.browse{flex:1;overflow-y:auto;padding:0 22px 40px;scrollbar-width:thin;scrollbar-color:#2a2a2a transparent}
.browse::-webkit-scrollbar{width:5px}
.browse::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.ptitle{font-family:var(--fd);font-size:26px;font-weight:800;margin-bottom:4px;padding-top:6px}
.psub{color:var(--text2);font-size:13px;margin-bottom:22px}
.sec{margin-bottom:30px}
.sech{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sect{font-family:var(--fd);font-size:18px;font-weight:800;cursor:pointer;transition:color .15s}
.sect:hover{color:var(--accent)}
.sall{font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:color .15s}
.sall:hover{color:#fff}
.shelf{display:flex;gap:13px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.shelf::-webkit-scrollbar{display:none}
.nores{text-align:center;padding:60px 20px;color:var(--text2)}

/* ── BROWSE CARD ─────────────────────────────── */
.bc{flex-shrink:0;width:148px;padding:13px;border-radius:10px;background:var(--bg2);cursor:pointer;transition:background .2s;position:relative}
.bc:hover{background:var(--bg3)}
.bc.sel{background:var(--bg3);outline:2px solid var(--accent);outline-offset:-1px}
.bcov{width:122px;height:122px;border-radius:6px;background:var(--bg4);margin-bottom:11px;position:relative;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.bcov img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.bcov img.ok{opacity:1}
.bshim{position:absolute;inset:0;background:linear-gradient(90deg,var(--bg4) 25%,var(--bg3) 50%,var(--bg4) 75%);background-size:200% 100%;animation:shim 1.6s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.bshim.gone{opacity:0;transition:opacity .3s;pointer-events:none}
.bemo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:0;transition:opacity .3s}
.bemo.show{opacity:1}
.btit{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.baut{font-size:11px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.brat{display:flex;align-items:center;gap:4px;margin-top:5px}
.bstar{color:#f0c040;font-size:9px}
.brn{font-size:10px;color:var(--text3)}

/* ── AUTHOR CARD ─────────────────────────────── */
.ac{flex-shrink:0;width:134px;padding:13px 10px;border-radius:10px;background:var(--bg2);cursor:pointer;transition:background .2s;text-align:center}
.ac:hover{background:var(--bg3)}
.aav{width:86px;height:86px;border-radius:50%;background:var(--bg4);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.anm{font-size:12px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asb{font-size:11px;color:var(--text2)}

/* ══════════════════════════════════════════════
   VS CODE DETAIL PANEL
══════════════════════════════════════════════ */
.dp{width:570px;background:#1e1e1e;border-left:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;overflow:hidden}
.dp.closed{width:0;border:none}
.dpi{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 transparent}
.dpi::-webkit-scrollbar{width:5px}
.dpi::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* top chrome bar (like VS Code tab bar) */
.vtop{background:#252526;border-bottom:1px solid #3c3c3c;height:35px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
.vbc{display:flex;align-items:center;gap:6px;font-size:12px;color:#777}
.vbc b{color:#ccc;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcls{background:none;border:none;color:#777;cursor:pointer;font-size:14px;padding:4px 6px;border-radius:4px;transition:all .15s}
.vcls:hover{background:#3c3c3c;color:#fff}

/* ── COVER HERO ──────────────────────────────── */
.vhero{padding:0;position:relative;overflow:hidden}
/* full-width blurred backdrop */
.vbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(32px) brightness(.35);transform:scale(1.1);z-index:0}
.vhero-inner{position:relative;z-index:1;padding:24px 22px 0}
.vrow{display:flex;gap:20px;align-items:flex-start;margin-bottom:0}

/* cover art */
.vcw{width:140px;height:196px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#2d2d2d;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.vcw img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s}
.vcw img.ok{opacity:1}
.vcph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px}
.vcshim{position:absolute;inset:0;background:linear-gradient(90deg,#2d2d2d 25%,#3a3a3a 50%,#2d2d2d 75%);background-size:200% 100%;animation:shim 1.6s infinite}
.vcshim.gone{opacity:0;transition:opacity .3s;pointer-events:none}

/* meta beside cover */
.vmeta{flex:1;min-width:0;padding-top:4px}
.vcat{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.vtitle{font-size:16px;font-weight:700;line-height:1.25;color:#fff;margin-bottom:5px}
.vauthor{font-size:13px;color:#999;margin-bottom:3px}
.vpub{font-size:12px;color:#666;margin-bottom:12px}

/* rating row */
.vrat-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.vrat-big{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;color:#f0c040;line-height:1}
.vrat-right{}
.vstars{color:#f0c040;font-size:13px;letter-spacing:1px}
.vvotes{font-size:11px;color:#666;margin-top:2px}

/* badge chips */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:600;border:1px solid}
.chip-g{background:rgba(29,185,84,.14);color:#1db954;border-color:rgba(29,185,84,.25)}
.chip-b{background:rgba(96,165,250,.12);color:#60a5fa;border-color:rgba(96,165,250,.2)}
.chip-y{background:rgba(240,192,64,.12);color:#f0c040;border-color:rgba(240,192,64,.2)}
.chip-p{background:rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.2)}
.chip-o{background:rgba(251,146,60,.12);color:#fb923c;border-color:rgba(251,146,60,.2)}
.chip-r{background:rgba(248,113,113,.12);color:#f87171;border-color:rgba(248,113,113,.2)}
.chip-d{background:rgba(156,163,175,.1);color:#9ca3af;border-color:rgba(156,163,175,.15)}

/* score bar */
.vsrow{display:flex;align-items:center;gap:8px}
.vslbl{font-size:10px;color:#555;width:62px}
.vstrack{flex:1;height:4px;background:#3c3c3c;border-radius:2px;overflow:hidden}
.vsfill{height:100%;background:linear-gradient(90deg,#1db954,#f0c040);border-radius:2px}
.vsval{font-size:10px;color:#666;width:26px;text-align:right}

/* separator */
.vsep{height:1px;background:#2d2d2d;margin:0}

/* ── ACTION BUTTONS ──────────────────────────── */
.vact{display:flex;gap:8px;padding:14px 22px;background:#252526;border-bottom:1px solid #3c3c3c;flex-wrap:wrap}
.btn-dl{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--accent);border:none;border-radius:4px;color:#000;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-dl:hover{background:var(--accent2);transform:scale(1.02)}
.btn-s{display:flex;align-items:center;gap:6px;padding:9px 14px;background:#2d2d2d;border:1px solid #3c3c3c;border-radius:4px;color:#ccc;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-s:hover{background:#3c3c3c;color:#fff;border-color:#555}
.btn-dis{opacity:.35;cursor:not-allowed;pointer-events:none}

/* ── PLATFORM STRIP ──────────────────────────── */
.vplat{padding:12px 22px 0;border-top:1px solid #2d2d2d}
.vplat-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;font-weight:700}
.vplat-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.plat-badge{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:5px;font-size:12px;font-weight:600;border:1px solid}

/* ── STATS ROW ───────────────────────────────── */
.vstats{display:flex;background:#252526;border-bottom:1px solid #333;border-top:1px solid #333;margin-bottom:0}
.vst{flex:1;padding:11px 4px;text-align:center;border-right:1px solid #333}
.vst:last-child{border-right:none}
.vstv{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.vstl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.5px}

/* ── TABS ────────────────────────────────────── */
.vtabs{display:flex;background:#252526;border-bottom:1px solid #3c3c3c;padding:0 22px;overflow-x:auto;scrollbar-width:none}
.vtabs::-webkit-scrollbar{display:none}
.vtab{padding:10px 16px;font-size:12px;font-weight:600;color:#777;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.vtab:hover{color:#ccc}
.vtab.on{color:#fff;border-bottom-color:var(--accent)}
.vtc{display:none;padding:18px 22px 24px}
.vtc.on{display:block}

/* ── OVERVIEW TAB ────────────────────────────── */
.vdesc{font-size:13px;color:#bbb;line-height:1.75;margin-bottom:18px}
.vsth{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-top:14px;border-top:1px solid #2d2d2d}
.vsth:first-child{border-top:none;padding-top:0}
.tgwrap{display:flex;flex-wrap:wrap;gap:6px}
.tg{padding:4px 11px;background:#2d2d2d;border-radius:3px;font-size:11px;color:#777;border:1px solid #3c3c3c;cursor:pointer;transition:all .15s}
.tg:hover{border-color:var(--accent);color:var(--accent)}

/* ── FILE & ACCESS TAB ───────────────────────── */
.fgrid{display:flex;flex-direction:column;gap:7px}
.frow{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;background:#252526;border:1px solid #3c3c3c;border-radius:5px}
.frl{display:flex;align-items:center;gap:10px}
.fico{font-size:18px}
.flbl{font-size:13px;color:#ccc;font-weight:500}
.fsub{font-size:11px;color:#555;margin-top:2px}
.fval{font-size:13px;color:#fff;font-weight:600;text-align:right}
.lnklist{display:flex;flex-direction:column;gap:7px;margin-top:14px}

/* ── SIMILAR BOOKS TAB ───────────────────────── */
.simlist{display:flex;flex-direction:column;gap:6px}
.si{display:flex;align-items:center;gap:11px;padding:9px 12px;background:#252526;border:1px solid #3c3c3c;border-radius:5px;cursor:pointer;transition:all .15s}
.si:hover{background:#2d2d2d;border-color:#555}
.sirk{width:18px;font-size:11px;color:#444;text-align:center;flex-shrink:0}
.sicov{width:38px;height:50px;border-radius:3px;background:#2d2d2d;overflow:hidden;flex-shrink:0;position:relative}
.sicov img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:3px}
.siph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:16px}
.siinf{flex:1;min-width:0}
.sitl{font-size:12px;font-weight:600;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.siau{font-size:11px;color:#555;margin-top:2px}
.sirr{flex-shrink:0;text-align:right}
.sipc{font-size:12px;color:var(--accent);font-weight:700}
.sirt{font-size:10px;color:#555;margin-top:2px}

/* ── DETAILS TAB ─────────────────────────────── */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.iitem{background:#252526;border:1px solid #3c3c3c;border-radius:5px;padding:10px 12px}
.ilbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ival{font-size:13px;color:#ddd;font-weight:500}

/* ── EMPTY STATE ─────────────────────────────── */
.dempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;gap:12px}
.dempty-i{font-size:52px}
.dempty-t{font-size:14px;text-align:center;line-height:1.6;max-width:200px;color:#444}

/* cat colours */
.cai{color:#a78bfa}.cpr{color:#60a5fa}.cse{color:#f87171}.ccl{color:#34d399}
.cds{color:#fb923c}.cdb{color:#f472b6}.cel{color:#fbbf24}.cme{color:#94a3b8}
.csw{color:#c084fc}.cne{color:#67e8f9}.cge{color:#6a6a6a}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
@media(max-width:1100px){.dp{width:490px}}
@media(max-width:900px){:root{--sw:200px}.dp{width:420px}}
@media(max-width:720px){.sidebar{display:none}.dp{display:none}}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">📚 <span>Bookify</span></div>
  <div class="sitem active" onclick="showHome()"><span class="sico">🏠</span>Home</div>
  <div class="sitem" onclick="focusSearch()"><span class="sico">🔍</span>Search</div>
  <div class="slbl">Library</div>
  <div class="sitem" onclick="setSrt('rating')"><span class="sico">⭐</span>Top Rated</div>
  <div class="sitem" onclick="setSrt('popularity')"><span class="sico">🔥</span>Most Popular</div>
  <div class="sitem" onclick="setSrt('year')"><span class="sico">🆕</span>Newest</div>
  <div class="slbl">Subjects</div>
  <div id="sbCats"></div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="navbtn">‹</button>
    <button class="navbtn">›</button>
    <div class="sbar">
      <span class="sico2">⌕</span>
      <input type="text" id="srch" placeholder="Search books, authors, topics…" autocomplete="off">
    </div>
    <div class="tbr">
      <button class="sbtn active" id="sb0" onclick="setSrt('score')">✦ Best Match</button>
      <button class="sbtn" id="sb1" onclick="setSrt('rating')">⭐ Rating</button>
      <button class="sbtn" id="sb2" onclick="setSrt('popularity')">🔥 Popular</button>
    </div>
  </div>
  <div class="carea">
    <div class="browse" id="browse"></div>

    <!-- VS CODE DETAIL PANEL -->
    <div class="dp closed" id="dp">
      <div class="vtop">
        <div class="vbc">Extensions › <b id="dpbc"></b></div>
        <button class="vcls" onclick="closeDP()">✕</button>
      </div>
      <div class="dpi" id="dpi">
        <div class="dempty">
          <div class="dempty-i">📖</div>
          <div class="dempty-t">Click any book to see full details</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

  }
  if (b.preview_link) ps.push({icon:'🔍', name:'Google Books Preview', color:'#60a5fa', url:b.preview_link});
  if (b.info_link)    ps.push({icon:'ℹ️', name:'Google Books', color:'#fb923c', url:b.info_link});
  ps.push({icon:'📚', name:'Open Library', color:'#a78bfa', url:'https://openlibrary.org/search?q='+encodeURIComponent(b.title)});
  ps.push({icon:'🔎', name:'Google Search', color:'#6a6a6a', url:'https://www.google.com/search?q='+encodeURIComponent(b.title+' '+b.author+' ebook')});
  return ps;
}

// ── cover cache & lazy loader ────────────────────────────────────────────
const COV={};
async function getCover(title,author){
  if(COV[title]!==undefined) return COV[title];
  COV[title]=null;
  try{
    const q=encodeURIComponent((title+' '+(author||'')).slice(0,60));
    const r=await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i,isbn`,
      {signal:AbortSignal.timeout(7000)});
    const d=await r.json();
    const doc=(d.docs||[])[0];
    let url=null;
    if(doc){
      if(doc.cover_i) url=`https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
      else if(doc.isbn?.[0]) url=`https://covers.openlibrary.org/b/isbn/${doc.isbn[0]}-M.jpg`;
    }
    COV[title]=url; return url;
  }catch{COV[title]=null; return null;}
}

function applyImg(wrap, url, shimSel, phSel){
  const shim=wrap.querySelector(shimSel), ph=wrap.querySelector(phSel);
  const img=new Image();
  img.onload=()=>{
    const el=document.createElement('img'); el.src=url; el.alt='';
    wrap.insertBefore(el,wrap.firstChild);
    requestAnimationFrame(()=>el.classList.add('ok'));
    if(shim) shim.classList.add('gone');
    if(ph) ph.style.opacity='0';
  };
  img.onerror=()=>{ if(shim)shim.classList.add('gone'); };
  img.src=url;
}

const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting) return;
    obs.unobserve(e.target);
    const w=e.target,t=w.dataset.title,a=w.dataset.author,em=w.dataset.emoji;
    if(COV[t]){applyImg(w,COV[t],'.bshim','.bemo');return;}
    getCover(t,a).then(url=>{
      if(url) applyImg(w,url,'.bshim','.bemo');
      else{const s=w.querySelector('.bshim');if(s)s.classList.add('gone');const e2=w.querySelector('.bemo');if(e2)e2.classList.add('show');}
    });
  });
},{rootMargin:'300px'});

// ── state ────────────────────────────────────────────────────────────────
let srt='score', cat='all', q='', activeTitle=null;

// ── sidebar ──────────────────────────────────────────────────────────────
const CATS=[...new Set(BOOKS.map(b=>b.category))].sort();
function buildSB(){
  const el=document.getElementById('sbCats');
  el.innerHTML=`<div class="cpill active" data-c="all" onclick="setCat('all',this)"><div class="cdot" style="background:#fff"></div>All Books</div>`
    +CATS.map(c=>`<div class="cpill" data-c="${c}" onclick="setCat('${c}',this)"><div class="cdot" style="background:${CCLR[c]||'#fff'}"></div>${CE[c]||'📐'} ${c}</div>`).join('');
}

function setCat(c,el){
  cat=c; q=''; document.getElementById('srch').value='';
  document.querySelectorAll('.cpill').forEach(p=>p.classList.toggle('active',p.dataset.c===c));
  render();
}

function setSrt(s){
  srt=s;
  ['sb0','sb1','sb2'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  const map={score:'sb0',rating:'sb1',popularity:'sb2'};
  if(map[s]) document.getElementById(map[s])?.classList.add('active');
  render();
}

function getBooks(){
  let list=BOOKS.filter(b=>{
    if(cat!=='all'&&b.category!==cat) return false;
    if(!q) return true;
    const lq=q.toLowerCase();
    return (b.title||'').toLowerCase().includes(lq)||(b.author||'').toLowerCase().includes(lq)
      ||(b.publisher||'').toLowerCase().includes(lq)||(b.desc_short||'').toLowerCase().includes(lq);
  });
  return [...list].sort((a,b2)=>{
    if(srt==='score')      return b2.score-a.score;
    if(srt==='rating')     return b2.rating-a.rating;
    if(srt==='popularity') return b2.ratings_count-a.ratings_count;
    if(srt==='year')       return b2.year-a.year;
    return 0;
  });
}

// ── render ───────────────────────────────────────────────────────────────
function render(){
  const books=getBooks(), br=document.getElementById('browse');
  if(q){
    if(!books.length){br.innerHTML='<div class="nores">😕 No results.</div>';return;}
    br.innerHTML=`<div class="ptitle" style="margin-bottom:16px">Results for "<span style="color:var(--accent)">${esc(q)}</span>"</div>`
      +`<div class="sec"><div class="shelf">${books.map(bcardH).join('')}</div></div>`;
    br.querySelectorAll('.bcov[data-title]').forEach(w=>obs.observe(w));
    return;
  }
  const byCat={};
  BOOKS.forEach(b=>{if(!byCat[b.category])byCat[b.category]=[];byCat[b.category].push(b);});
  const top10=[...BOOKS].sort((a,b)=>b.score-a.score).slice(0,10);
  const topR=[...BOOKS].filter(b=>b.rating>0).sort((a,b)=>b.rating-a.rating).slice(0,10);
  const newest=[...BOOKS].filter(b=>b.year>0).sort((a,b)=>b.year-a.year).slice(0,10);
  const authors=getAuthors();

  let h=`<div class="ptitle">Good ${greet()} 👋</div><div class="psub">${BOOKS.length} engineering books ready to explore</div>`;
  h+=shelf('🏆 Top Picks',top10);
  Object.entries(byCat).sort((a,b)=>b[1].length-a[1].length).slice(0,5).forEach(([c,bs])=>{
    h+=shelf(`${CE[c]||'📚'} ${c}`,[...bs].sort((a,b)=>b.score-a.score).slice(0,8));
  });
  if(authors.length){
    h+=`<div class="sec"><div class="sech"><div class="sect">✍️ Notable Authors</div></div><div class="shelf">`
      +authors.map(([a,bs])=>`<div class="ac" data-a="${ea(a)}" onclick="openAuthor(this.dataset.a)">`
        +`<div class="aav">${CE[bs[0]?.category]||'✍️'}</div>`
        +`<div class="anm">${esc(a)}</div><div class="asb">${bs.length} books</div></div>`).join('')
      +`</div></div>`;
  }
  h+=shelf('⭐ Highest Rated',topR);
  h+=shelf('🆕 Recently Published',newest);
  br.innerHTML=h;
  br.querySelectorAll('.bcov[data-title]').forEach(w=>obs.observe(w));
}

function shelf(t,books){
  if(!books.length) return '';
  return `<div class="sec"><div class="sech"><div class="sect">${t}</div></div><div class="shelf">${books.map(bcardH).join('')}</div></div>`;
}

function bcardH(b){
  const ce=CE[b.category]||'📚', cc=CC[b.category]||'cge';
  const sel=b.title===activeTitle?' sel':'';
  return `<div class="bc${sel}" data-t="${ea(b.title)}" onclick="openDP(this.dataset.t)">
    <div class="bcov" data-title="${ea(b.title)}" data-author="${ea(b.author||'')}" data-emoji="${ce}">
      <div class="bshim"></div><div class="bemo">${ce}</div>
    </div>
    <div class="btit" title="${ea(b.title)}">${esc(b.title)}</div>
    <div class="baut">${esc(b.author||'Unknown')}</div>
    <div class="brat"><span class="bstar">${stars(b.rating)}</span><span class="brn">${b.rating>0?b.rating.toFixed(1):'—'}</span></div>
  </div>`;
}

function getAuthors(){
  const m={};
  BOOKS.forEach(b=>{const a=(b.author||'Unknown').split(',')[0].trim();if(!m[a])m[a]=[];m[a].push(b);});
  return Object.entries(m).filter(([,bs])=>bs.length>=2).sort((a,b)=>b[1].length-a[1].length).slice(0,10);
}

function openAuthor(author){
  const bs=BOOKS.filter(b=>(b.author||'').split(',')[0].trim()===author).sort((a,b)=>b.score-a.score);
  const ce=CE[bs[0]?.category]||'✍️';

  document.getElementById('browse').querySelectorAll('.bcov[data-title]').forEach(w=>obs.observe(w));
  closeDP();
}

// ── utilities ────────────────────────────────────────────────────────────
function stars(r){if(!r)return'☆☆☆☆☆';const f=Math.min(5,Math.round(r));return'★'.repeat(f)+'☆'.repeat(5-f);}
function starsH(r){if(!r)return'☆☆☆☆☆';const f=Math.min(5,Math.round(r));return`<span style="color:#f0c040">${'★'.repeat(f)}</span><span style="color:#444">${'☆'.repeat(5-f)}</span>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function greet(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xfffffff;return h.toString(16);}
function extractTags(desc,cat){
  const kws=['Python','Java','C++','JavaScript','Machine Learning','Deep Learning','Neural Network',
    'Security','Network','Database','Cloud','Docker','Kubernetes','Algorithm','Data Structure',
    'Embedded','Signal Processing','Compiler','Operating System','Design Pattern','Agile',
    'DevOps','SQL','NoSQL','Microservices','API','Cryptography','Linux','FPGA','Arduino'];
  const t=(desc||'').toLowerCase();
  const found=kws.filter(k=>t.includes(k.toLowerCase()));
  found.unshift(cat);
  return [...new Set(found)].slice(0,10);
}
function searchTag(t){q=t;document.getElementById('srch').value=t;render();}
function showHome(){q='';cat='all';document.getElementById('srch').value='';
  document.querySelectorAll('.cpill').forEach(p=>p.classList.toggle('active',p.dataset.c==='all'));render();}
function focusSearch(){document.getElementById('srch').focus();}

  q=e.target.value.trim();clearTimeout(dt);dt=setTimeout(render,180);
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDP();});
