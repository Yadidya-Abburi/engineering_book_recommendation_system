<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookify – Engineering Book Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#121212;--bg2:#181818;--bg3:#232323;--bg4:#2a2a2a;
  --sidebar:#000;--accent:#1db954;--accent2:#1ed760;
  --text:#fff;--text2:#b3b3b3;--text3:#6a6a6a;--border:#2a2a2a;
  --hover:#282828;--sw:242px;--font:'Figtree',sans-serif;--fd:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:thin}
.logo{padding:22px 20px 14px;font-family:var(--fd);font-size:20px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo span{color:#fff}
.slbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:10px 20px 5px}
.sitem{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
.sitem:hover, .sitem.active{color:#fff}
.sitem.active{background: rgba(255,255,255,0.05);}
.sitem.active .sico{color:var(--accent)}
.sico{font-size:16px;width:20px;text-align:center;flex-shrink:0}

.cpill{display:flex;align-items:center;gap:9px;padding:7px 20px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500}
.cpill:hover, .cpill.active{color:#fff}
.cpill.active{background: rgba(255,255,255,0.1); border-radius: 4px;}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,#1a1a2e 0%,var(--bg) 280px)}
.topbar{height:58px;display:flex;align-items:center;padding:0 22px;gap:13px;flex-shrink:0;z-index:10}
.sbar{flex:1;max-width:360px;position:relative}
.sbar input{width:100%;padding:9px 14px 9px 38px;background:var(--bg3);border:none;border-radius:22px;color:var(--text);font-size:13px;outline:none}
.sico2{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.tbr{margin-left:auto;display:flex;gap:7px}
.sbtn{padding:6px 13px;background:var(--bg3);border:none;border-radius:18px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer}
.sbtn.active{background:var(--accent);color:#000}

/* ── CONTENT SCROLLING ── */
.browse{flex:1;overflow-y:auto;padding:0 22px 40px;scrollbar-width:thin}
.ptitle{font-family:var(--fd);font-size:26px;font-weight:800;margin-bottom:4px;padding-top:6px}
.psub{color:var(--text2);font-size:13px;margin-bottom:22px}
.sec{margin-bottom:30px}

/* ── LAYOUT 1: HORIZONTAL SHELF (Home) ── */
.shelf{display:flex;gap:13px;overflow-x:auto;padding-bottom:10px}
.shelf::-webkit-scrollbar{display:none}
.shelf .bc { flex-shrink: 0; width: 148px; } /* Fixed width for horizontal scrolling */

/* ── LAYOUT 2: MATRIX GRID (Search/Domains) ── */
.matrix-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  padding-top: 10px;
}
.matrix-grid .bc { 
  width: 100% !important; /* Allow card to fill the grid cell */
  flex-shrink: 1 !important; 
}

/* ── BOOK CARD ── */
.bc{padding:13px;border-radius:10px;background:var(--bg2);cursor:pointer;transition:background .2s;position:relative}
.bc:hover{background:var(--bg3)}
.bc.sel{background:var(--bg3);outline:2px solid var(--accent);outline-offset:-1px}
.bcov{width:100%; aspect-ratio:1/1; border-radius:6px;background:var(--bg4);margin-bottom:11px;position:relative;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.bcov img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.bcov img.ok{opacity:1}
.bshim{position:absolute;inset:0;background:linear-gradient(90deg,var(--bg4) 25%,var(--bg3) 50%,var(--bg4) 75%);background-size:200% 100%;animation:shim 1.6s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.bemo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:0;transition:opacity .3s}
.bemo.show{opacity:1}
.btit{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.baut{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brat{display:flex;align-items:center;gap:4px;margin-top:5px}
.bstar{color:#f0c040;font-size:10px}
.brn{font-size:10px;color:var(--text3)}

/* ── DETAIL PANEL (EXTENSION TAB) ── */
.dp{width:560px;background:#1e1e1e;border-left:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;overflow:hidden}
.dp.closed{width:0;border:none}
.vtop{background:#252526;border-bottom:1px solid #3c3c3c;height:35px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.vbc{display:flex;align-items:center;gap:6px;font-size:12px;color:#777}
.vbc b{color:#ccc;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcls{background:none;border:none;color:#777;cursor:pointer;font-size:14px;padding:4px 6px;border-radius:4px}
.vcls:hover{background:#3c3c3c;color:#fff}
.dpi{flex:1;overflow-y:auto;}
.vhero{position:relative;overflow:hidden;min-height:260px}
.vbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(35px) brightness(0.35);transform:scale(1.1);z-index:0}
.vhero-inner{position:relative;z-index:1;padding:30px 25px; display:flex; gap:25px}
.vcw{width:150px;height:210px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#2d2d2d;position:relative;box-shadow:0 15px 45px rgba(0,0,0,.8)}
.badge-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}
.badge{padding:3px 10px; border-radius:12px; background:rgba(255,255,255,0.08); font-size:10px; font-weight:700; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.7)}
.vact-bar{padding:15px 25px; background:#252526; border-bottom:1px solid #333; display:flex; align-items:center; gap:12px}
.btn-dl{padding:10px 22px; background:var(--accent); border:none; border-radius:4px; color:#000; font-size:13px; font-weight:700; cursor:pointer; text-decoration:none}
.btn-dl:hover{background:var(--accent2)}
.vtabs{display:flex;background:#252526;border-bottom:1px solid #3c3c3c}
.vtab{padding:12px 20px;font-size:12px;font-weight:600;color:#fff;border-bottom:2px solid var(--accent)}

.nores{text-align:center;padding:60px 20px;color:var(--text2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo">📚 <span>Bookify</span></div>
  <div class="sitem active" id="homeBtn" onclick="showHome()"><span class="sico">🏠</span>Home</div>
  <div class="sitem" onclick="focusSearch()"><span class="sico">🔍</span>Search</div>
  <div class="slbl">Library</div>
  <div class="sitem" id="nav_rating" onclick="setSrt('rating')"><span class="sico">⭐</span>Top Rated</div>
  <div class="sitem" id="nav_popularity" onclick="setSrt('popularity')"><span class="sico">🔥</span>Most Popular</div>
  <div class="sitem" id="nav_year" onclick="setSrt('year')"><span class="sico">🆕</span>Newest</div>
  <div class="slbl">Domains</div>
  <div id="sbCats"></div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="sbar">
      <span class="sico2">⌕</span>
      <input type="text" id="srch" placeholder="Search books, authors, topics…" autocomplete="off">
    </div>
    <div class="tbr">
      <button class="sbtn active" id="sb_score" onclick="setSrt('score')">✦ Best Match</button>
      <button class="sbtn" id="sb_rating" onclick="setSrt('rating')">⭐ Rating</button>
      <button class="sbtn" id="sb_popularity" onclick="setSrt('popularity')">🔥 Popular</button>
    </div>
  </div>
  <div class="carea">
    <div class="browse" id="browse">
        <div class="nores">📡 Connecting to Bookify Engine...</div>
    </div>
    <div class="dp closed" id="dp">
      <div class="vtop"><div class="vbc">Extension › <b id="dpbc"></b></div><button class="vcls" onclick="closeDP()">✕</button></div>
      <div class="dpi" id="dpi"></div>
    </div>
  </div>
</div>
</div>

<script>
let BOOKS = [];
let RECS = {};
let srt = 'score', cat = 'all', q = '', activeTitle = null;

const CE={'AI/ML':'🤖','Programming':'💻','Security':'🔐','Cloud/DevOps':'☁️','Data Science':'📊','Databases':'🗄️','Electrical':'⚡','Mechanical':'⚙️','Software Eng':'🏗️','Networking':'🌐','General Engineering':'📐','Civil':'🏛️','Game/Graphics':'🎮'};
const CCLR={'AI/ML':'#a78bfa','Programming':'#60a5fa','Security':'#f87171','Cloud/DevOps':'#34d399','Data Science':'#fb923c','Databases':'#f472b6','Electrical':'#fbbf24','Mechanical':'#94a3b8','Software Eng':'#c084fc','Networking':'#67e8f9','General Engineering':'#6a6a6a','Civil':'#a3b899','Game/Graphics':'#f9a8d4'};

async function startApp() {
  try {
    const resBooks = await fetch('/api/books');
    BOOKS = await resBooks.json();
    const resRecs = await fetch('/api/recs');
    RECS = await resRecs.json();
    if (BOOKS.length > 0) { buildSB(); render(); }
  } catch (error) {
    document.getElementById('browse').innerHTML = '<div class="nores">❌ Connection failure. Check your Python terminal.</div>';
  }
}

function buildSB(){
  const uniqueCats = [...new Set(BOOKS.map(b => b.category).filter(c => c))].sort();
  const el = document.getElementById('sbCats');
  el.innerHTML = uniqueCats.map(c => `<div class="cpill" data-c="${c}" onclick="setCat('${c}', this)"><div class="cdot" style="background:${CCLR[c] || '#fff'}"></div>${CE[c] || '📐'} ${c}</div>`).join('');
}

function getFilteredBooks() {
  let list = BOOKS.filter(b => {
    if (cat !== 'all' && b.category !== cat) return false;
    if (!q) return true;
    const lq = q.toLowerCase();
    return (b.title||'').toLowerCase().includes(lq) || (b.author||'').toLowerCase().includes(lq);
  });
  return [...list].sort((a, b) => {
    if(srt==='score') return b.score - a.score;
    if(srt==='rating') return (b.rating || 0) - (a.rating || 0);
    if(srt==='popularity') return (b.ratings_count || 0) - (a.ratings_count || 0);
    if(srt==='year') return (b.year || 0) - (a.year || 0);
    return 0;
  });
}

function render() {
  const books = getFilteredBooks();
  const br = document.getElementById('browse');
  
  if (q || cat !== 'all' || srt !== 'score') {
    let title = q ? `Results for "${q}"` : (cat !== 'all' ? `${CE[cat]||'📚'} ${cat}` : `Highest ${srt}`);
    // USE MATRIX GRID CLASS HERE
    br.innerHTML = `<div class="ptitle">${esc(title)}</div><div class="psub">${books.length} items</div><div class="matrix-grid">${books.map(bcardH).join('')}</div>`;
  } else {
    const byCat = {};
    BOOKS.forEach(b => { if(!byCat[b.category]) byCat[b.category]=[]; byCat[b.category].push(b); });
    let h = `<div class="ptitle">Good ${greet()} 👋</div><div class="psub">${BOOKS.length} books ready</div>`;
    h += shelf('🏆 Top Picks', [...BOOKS].sort((a,b)=>b.score-a.score).slice(0,10));
    Object.entries(byCat).sort((a,b)=>b[1].length-a[1].length).forEach(([c, bs]) => {
      h += shelf(`${CE[c]||'📚'} ${c}`, [...bs].sort((a,b)=>b.score-a.score).slice(0, 10));
    });
    br.innerHTML = h;
  }
  br.querySelectorAll('.bcov[data-title]').forEach(w => obs.observe(w));
}

function shelf(t, bs) { return `<div class="sec"><div class="sech"><div class="sect">${t}</div></div><div class="shelf">${bs.map(bcardH).join('')}</div></div>`; }

function bcardH(b) {
  const sel = b.title === activeTitle ? ' sel' : '';
  return `<div class="bc${sel}" data-t="${ea(b.title)}" onclick="openDP(this.dataset.t)">
    <div class="bcov" data-title="${ea(b.title)}" data-author="${ea(b.author)}"><div class="bshim"></div><div class="bemo">${CE[b.category]||'📚'}</div></div>
    <div class="btit">${esc(b.title)}</div><div class="baut">${esc(b.author)}</div>
    <div class="brat"><span class="bstar">★</span><span class="brn">${b.rating || '—'}</span></div>
  </div>`;
}

function openDP(title) {
  const b = BOOKS.find(x => x.title === title); if(!b) return;
  activeTitle = title;
  document.querySelectorAll('.bc').forEach(el => el.classList.toggle('sel', el.dataset.t === title));
  const dp = document.getElementById('dp'); const dpi = document.getElementById('dpi');
  document.getElementById('dpbc').textContent = b.title; dp.classList.remove('closed');
  const recs = RECS[title] || []; const scorePct = Math.round(b.score * 100);

  dpi.innerHTML = `
    <div class="vhero">
      <div class="vbg" id="vbg" style="background-image:url('')"></div>
      <div class="vhero-inner">
        <div class="vcw" id="dpCovWrap"><div class="bshim"></div><div class="bemo" style="font-size:55px; display:flex; align-items:center; justify-content:center; height:100%">${CE[b.category]||'📚'}</div></div>
        <div class="vmeta" style="flex:1">
          <div style="font-size:11px; color:var(--accent); font-weight:900; text-transform:uppercase">${b.category}</div>
          <h2 style="font-size:22px; margin:8px 0; line-height:1.2">${esc(b.title)}</h2>
          <div style="color:#aaa; font-size:14px; margin-bottom:12px">by ${esc(b.author)}</div>
          <div style="display:flex; align-items:center; gap:12px"><span style="font-size:32px; font-weight:800; color:#f0c040">${b.rating || '—'}</span><div><div style="font-size:12px; color:#f0c040">★★★★★</div><div style="font-size:10px; color:#555">${b.ratings_count || 0} reviews</div></div></div>
          <div class="badge-row"><span class="badge">TECHNICAL</span><span class="badge">${b.year || 'Classic'}</span><span class="badge">${scorePct}% AI Match</span></div>
        </div>
      </div>
    </div>
    <div class="vact-bar">
      ${b.download_link ? `<a href="${b.download_link}" target="_blank" class="btn-dl">Install / Download</a>` : `<button class="btn-dl" style="opacity:0.3; cursor:not-allowed">Direct Link N/A</button>`}
      <a href="https://openlibrary.org/search?q=${encodeURIComponent(b.title)}" target="_blank" style="padding:9px 18px; border:1px solid #444; color:#ccc; border-radius:4px; text-decoration:none; font-size:13px">Check Repository</a>
    </div>
    <div class="vtabs"><div class="vtab on">Description & Recommendations</div></div>
    <div style="padding:22px">
      <p style="color:#bbb; line-height:1.7; font-size:14px; margin-bottom:25px">${esc(b.desc_short)}...</p>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:25px">
         <div style="background:#252526; padding:12px; border-radius:6px; border:1px solid #333"><div style="font-size:9px; color:#555; margin-bottom:4px">PUBLISHER</div><div style="font-size:13px">${esc(b.publisher)}</div></div>
         <div style="background:#252526; padding:12px; border-radius:6px; border:1px solid #333"><div style="font-size:9px; color:#555; margin-bottom:4px">CATEGORY</div><div style="font-size:13px">${b.category}</div></div>
      </div>
      <h4 style="font-size:11px; color:#555; text-transform:uppercase; margin-bottom:12px">Similar Resources</h4>
      <div class="simlist">${recs.map(r => `
        <div onclick="openDP('${ea(r.title)}')" style="display:flex; gap:12px; background:#252526; padding:10px; border-radius:6px; margin-bottom:8px; cursor:pointer; border:1px solid #333">
           <div style="font-size:20px">${CE[BOOKS.find(x=>x.title===r.title)?.category] || '📚'}</div>
           <div style="flex:1; min-width:0"><div style="font-size:12px; font-weight:700; color:#ddd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${esc(r.title)}</div><div style="font-size:10px; color:#666">Match: ${Math.round(r.similarity*100)}%</div></div>
        </div>`).join('')}</div>
    </div>
  `;

  getCover(b.title, b.author).then(url => { if(url) { applyImg(document.getElementById('dpCovWrap'), url, '.bshim', '.bemo'); document.getElementById('vbg').style.backgroundImage = `url('${url}')`; } });
}

function closeDP() { document.getElementById('dp').classList.add('closed'); activeTitle = null; document.querySelectorAll('.bc').forEach(el=>el.classList.remove('sel')); }

function setCat(c, el) { 
    cat = c; q = ''; document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));
    if(el) el.classList.add('active'); document.getElementById('homeBtn').classList.remove('active');
    render(); 
}

function showHome() { 
    cat = 'all'; q = ''; srt = 'score'; document.getElementById('srch').value = ''; 
    document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));
    document.getElementById('homeBtn').classList.add('active');
    ['sb_score','sb_rating','sb_popularity'].forEach((id,i)=>document.getElementById(id).classList.toggle('active', i===0));
    render(); 
}

function setSrt(s) { srt = s; ['sb_score','sb_rating','sb_popularity'].forEach(id => document.getElementById(id).classList.toggle('active', id === 'sb_'+s)); render(); }

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(!e.isIntersecting) return;
    obs.unobserve(e.target);
    getCover(e.target.dataset.title, e.target.dataset.author).then(url => {
        if(url) applyImg(e.target, url, '.bshim', '.bemo');
        else { e.target.querySelector('.bshim').classList.add('gone'); e.target.querySelector('.bemo').classList.add('show'); }
    });
  });
});

async function getCover(title, author) {
    try {
        const qStr = encodeURIComponent(title + ' ' + (author || ''));
        const r = await fetch(`https://openlibrary.org/search.json?q=${qStr}&limit=1&fields=cover_i`);
        const d = await r.json();
        return d.docs[0]?.cover_i ? `https://covers.openlibrary.org/b/id/${d.docs[0].cover_i}-M.jpg` : null;
    } catch { return null; }
}

function applyImg(wrap, url, shim, ph) {
    const img = new Image();
    img.onload = () => {
        const el = document.createElement('img'); el.src = url; wrap.insertBefore(el, wrap.firstChild);
        setTimeout(() => el.classList.add('ok'), 50); const s = wrap.querySelector(shim); if(s) s.classList.add('gone');
    };
    img.src = url;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function ea(s) { return String(s||'').replace(/"/g,'&quot;'); }
function greet() { const h = new Date().getHours(); return h<12?'morning':h<14?'afternoon':'evening'; }

let dt;
document.getElementById('srch').addEventListener('input', e => {
  q = e.target.value.trim(); clearTimeout(dt); dt = setTimeout(render, 200);
});

startApp();
</script>
</body>
</html>
